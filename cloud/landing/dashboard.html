<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a1a;--bg2:#0f1029;--bg3:#171840;
  --fg:#f0f2ff;--fg2:#a0a5c8;--fg3:#5e6388;
  --cyan:#00d4ff;--cyan-dim:rgba(0,212,255,.06);--cyan-glow:rgba(0,212,255,.15);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,.06);
  --purple:#8b5cf6;--green:#22c55e;--green-dim:rgba(34,197,94,.06);
  --red:#ef4444;--yellow:#f59e0b;--orange:#f97316;
  --bd:rgba(255,255,255,.06);--glass:rgba(15,16,41,.6);
  --sans:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
body{font-family:var(--sans);background:var(--bg);color:var(--fg);min-height:100vh;-webkit-font-smoothing:antialiased}
.bg-orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px);animation:orbFloat 20s ease-in-out infinite}
.orb-1{width:600px;height:600px;background:rgba(0,212,255,.07);top:-15%;left:-8%}
.orb-2{width:500px;height:500px;background:rgba(139,92,246,.06);bottom:5%;right:-8%;animation-delay:-7s}
.orb-3{width:450px;height:450px;background:rgba(59,130,246,.05);top:35%;left:45%;animation-delay:-13s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,-20px) scale(1.05)}50%{transform:translate(-20px,30px) scale(.95)}75%{transform:translate(20px,10px) scale(1.02)}}
a{color:var(--cyan);text-decoration:none}
.h{display:none!important}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:2}
.auth-card{background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--bd);border-radius:20px;padding:40px;max-width:420px;width:92%;position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan-glow),transparent)}
.auth-logo{font-family:var(--mono);font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;letter-spacing:1px}
.auth-sub{font-size:14px;color:var(--fg2);margin-bottom:28px}
.toggle-bar{display:flex;margin-bottom:20px;border-radius:10px;overflow:hidden;border:1px solid var(--bd);background:var(--bg)}
.toggle-bar button{flex:1;padding:10px;border:none;font-size:12px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:.2s}
.toggle-bar .active{background:var(--cyan-dim);color:var(--cyan)}
.toggle-bar .inactive{background:transparent;color:var(--fg3)}
.lbl{font-size:10px;color:var(--fg3);font-family:var(--mono);display:block;margin-bottom:4px;letter-spacing:.5px}
.inp{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--bd);border-radius:10px;color:var(--fg);font-size:13px;font-family:var(--mono);outline:none;margin-bottom:12px;transition:border .2s}
.inp:focus{border-color:var(--cyan-glow)}
select.inp{appearance:none;cursor:pointer}
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,var(--cyan),var(--blue));color:#fff;border:none;border-radius:10px;font-weight:700;font-size:14px;font-family:var(--sans);cursor:pointer;letter-spacing:.3px;transition:.2s}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.divider{display:flex;align-items:center;gap:14px;margin:20px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bd)}
.divider span{font-size:10px;color:var(--fg3);font-family:var(--mono)}
.btn-github{width:100%;padding:12px;font-size:13px;font-weight:600;border:1px solid var(--bd);border-radius:10px;background:var(--bg);color:var(--fg);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:var(--sans);transition:.2s}
.btn-github:hover{border-color:var(--cyan-glow);background:var(--cyan-dim)}
.btn-github svg{width:20px;height:20px}
.err-msg{color:var(--red);font-size:12px;margin-bottom:10px;font-family:var(--mono)}
.key-box{margin-bottom:14px;padding:14px;background:var(--green-dim);border:1px solid rgba(34,197,94,.2);border-radius:10px}
.key-box .key-label{font-size:11px;color:var(--green);font-family:var(--mono);margin-bottom:6px}
.key-box code{font-size:11px;color:var(--fg);font-family:var(--mono);word-break:break-all;display:block;padding:8px;background:var(--bg);border-radius:6px;user-select:all}
.auth-footer{font-size:11px;color:var(--fg3);margin-top:16px;text-align:center}
.dash-wrap{min-height:100vh;position:relative;z-index:2}
.dash-header{padding:14px 24px;background:var(--glass);backdrop-filter:blur(24px);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.dash-logo{font-family:var(--mono);font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dash-user{display:flex;align-items:center;gap:12px}
.dash-plan{font-size:10px;padding:3px 10px;border-radius:20px;font-family:var(--mono);font-weight:600;background:var(--cyan-dim);color:var(--cyan);border:1px solid var(--cyan-glow)}
.dash-email{font-size:12px;color:var(--fg2)}
.btn-logout{padding:6px 14px;background:transparent;border:1px solid var(--bd);border-radius:8px;color:var(--fg3);font-size:11px;font-family:var(--mono);cursor:pointer;transition:.2s}
.btn-logout:hover{border-color:var(--red);color:var(--red)}
.tabs{display:flex;gap:2px;padding:0 24px;background:var(--bg2);border-bottom:1px solid var(--bd);overflow-x:auto}
.tab{padding:12px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--fg3);font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;white-space:nowrap;transition:.15s}
.tab:hover{color:var(--fg2)}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab-refresh{margin-left:auto;padding:6px 14px;background:transparent;border:1px solid var(--bd);border-radius:6px;color:var(--fg3);font-size:10px;font-family:var(--mono);cursor:pointer;align-self:center;margin-right:24px}
.content{padding:24px;max-width:1200px;margin:0 auto}
.card{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--bd);border-radius:14px;padding:22px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;margin-bottom:14px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:20px 22px}
.stat-label{font-size:10px;color:var(--fg3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:28px;font-weight:700;font-family:var(--mono);margin:6px 0}
.stat-bar{height:4px;background:rgba(255,255,255,.04);border-radius:2px;margin-top:4px}
.stat-fill{height:4px;border-radius:2px}
.info-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.info-row .k{color:var(--fg3)}
.info-row .v{font-family:var(--mono);color:var(--fg)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.btn-action{padding:8px 18px;background:linear-gradient(135deg,var(--cyan),var(--blue));color:#fff;border:none;border-radius:8px;font-weight:700;font-size:12px;font-family:var(--sans);cursor:pointer;transition:.2s;white-space:nowrap}
.btn-action:hover{filter:brightness(1.1)}
.btn-outline{padding:8px 18px;background:transparent;border:1px solid var(--cyan-glow);color:var(--cyan);border-radius:8px;font-weight:600;font-size:12px;font-family:var(--sans);cursor:pointer;transition:.2s}
.btn-danger{background:transparent;border:1px solid rgba(239,68,68,.2);color:var(--red);padding:4px 10px;border-radius:6px;font-size:10px;cursor:pointer}
.tag{font-size:9px;padding:2px 6px;border-radius:4px;font-family:var(--mono);font-weight:600;display:inline-block}
.tag-cyan{background:var(--cyan-dim);color:var(--cyan);border:1px solid var(--cyan-glow)}
.tag-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.tag-red{background:rgba(239,68,68,.06);color:var(--red);border:1px solid rgba(239,68,68,.15)}
@media(max-width:768px){.grid-2{grid-template-columns:1fr!important}.stat-grid{grid-template-columns:1fr 1fr!important}}
@media(max-width:500px){.stat-grid{grid-template-columns:1fr!important}}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<div id="V-auth" class="auth-wrap">
<div class="auth-card">
  <div class="auth-logo">AIB<span style="-webkit-text-fill-color:var(--fg2);font-weight:400">cloud</span></div>
  <div id="A-sub" class="auth-sub">Sign in to your account</div>
  <div class="toggle-bar">
    <button id="A-tl" class="active" onclick="AM('login')">Login</button>
    <button id="A-ts" class="inactive" onclick="AM('signup')">Sign up</button>
  </div>
  <div id="A-nf" class="h"><span class="lbl">FULL NAME</span><input id="A-name" placeholder="Your Name" class="inp"></div>
  <span class="lbl">EMAIL</span><input id="A-email" type="email" placeholder="you@company.com" class="inp">
  <span class="lbl">PASSWORD</span><input id="A-pass" type="password" placeholder="Min 8 characters" class="inp" onkeydown="if(event.key==='Enter')DA()">
  <div id="A-err" class="err-msg h"></div>
  <div id="A-key" class="key-box h">
    <div class="key-label">Your API key (save it now):</div>
    <code id="A-kv"></code>
  </div>
  <button id="A-btn" onclick="DA()" class="btn-primary">> sign in</button>
  <div class="divider"><span>OR</span></div>
  <button onclick="GH()" class="btn-github">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
    Sign in with GitHub
  </button>
  <div class="auth-footer">Free beta · No credit card required</div>
</div>
</div>
<div id="V-dash" class="dash-wrap h">
  <div class="dash-header">
    <a href="/" class="dash-logo">AIB<span style="-webkit-text-fill-color:var(--fg2);font-weight:400">cloud</span></a>
    <div class="dash-user">
      <span id="D-plan" class="dash-plan">beta</span>
      <span id="D-em" class="dash-email"></span>
      <button onclick="LO()" class="btn-logout">logout</button>
    </div>
  </div>
  <div style="display:flex;align-items:stretch">
    <div class="tabs" id="D-tabs" style="flex:1"></div>
    <button class="tab-refresh" onclick="LD().then(()=>{RT();RC()})">↻ refresh</button>
  </div>
  <div class="content" id="D-content"></div>
</div>
<script>
const B="https://vempwtzknixfnvysmiwo.supabase.co/functions/v1";
const SB_URL="https://vempwtzknixfnvysmiwo.supabase.co";
const SB_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlbXB3dHprbml4Zm52eXNtaXdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDM1MTI1MjAsImV4cCI6MjA1OTA4ODUyMH0.Bkj6mCb1vu3Ei7CfV5DPClzQOMCVTzxVHpnVkFKDbuw";
const sb=supabase.createClient(SB_URL,SB_ANON,{auth:{detectSessionInUrl:false,autoRefreshToken:false,persistSession:true}});
let S={m:"login",ss:null,ak:"",u:null,pp:[],t:"overview"};
let ghHandled=false;
async function GH(){const{error}=await sb.auth.signInWithOAuth({provider:'github',options:{redirectTo:window.location.origin+'/dashboard'}});if(error)alert('GitHub auth error: '+error.message);}
async function handleOAuthSession(session){if(ghHandled)return;ghHandled=true;S.ss={access_token:session.access_token,refresh_token:session.refresh_token,user:session.user};try{const d=await F("auth",{method:"POST",body:{action:"oauth_login"},token:session.access_token});if(d.api_key){S.ak=d.api_key;document.getElementById("A-kv").textContent=d.api_key;document.getElementById("A-key").classList.remove("h");}if(d.api_keys&&d.api_keys.length>0&&!S.ak)S.ak=d.api_keys[0].key_preview;if(d.org)S.ss.org=d.org;if(d.api_keys)S.ss.api_keys=d.api_keys;}catch(e){}window.history.replaceState({},'',window.location.pathname);SD();}
(async()=>{
  // 1. Check hash fragment for OAuth implicit flow tokens
  var h=window.location.hash;
  if(h&&h.includes('access_token')){
    var p=new URLSearchParams(h.substring(1));
    var at=p.get('access_token'),rt=p.get('refresh_token');
    if(at){
      // Decode JWT payload directly (no network call needed)
      try{
        var parts=at.split('.');
        var payload=JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
        var user={id:payload.sub,email:payload.email,user_metadata:payload.user_metadata||{},app_metadata:payload.app_metadata||{}};
        await handleOAuthSession({access_token:at,refresh_token:rt,user:user});
        return;
      }catch(e){console.error('JWT decode error',e);}
    }
  }
  // 2. Check existing SDK session (returning user / email login)
  try{var{data:{session}}=await sb.auth.getSession();if(session?.access_token)await handleOAuthSession(session);}catch(e){}
  // 3. Listen for future auth changes
  sb.auth.onAuthStateChange((ev,session)=>{if(ev==='SIGNED_IN'&&session&&!ghHandled)handleOAuthSession(session);});
})();
async function F(e,o={}){const h={"Content-Type":"application/json"};if(S.ak)h["x-api-key"]=S.ak;else if(S.ss?.access_token)h["Authorization"]="Bearer "+S.ss.access_token;if(o.token)h["Authorization"]="Bearer "+o.token;const r=await fetch(B+"/"+e,{method:o.method||"GET",headers:h,body:o.body?JSON.stringify(o.body):undefined});return r.json();}
function AM(m){S.m=m;document.getElementById("A-tl").className=m==="login"?"active":"inactive";document.getElementById("A-ts").className=m==="signup"?"active":"inactive";document.getElementById("A-nf").classList.toggle("h",m!=="signup");document.getElementById("A-sub").textContent=m==="login"?"Sign in to your account":"Create your account";document.getElementById("A-btn").textContent=m==="login"?"> sign in":"> create account";document.getElementById("A-err").classList.add("h");document.getElementById("A-key").classList.add("h");}
async function DA(){const e=document.getElementById("A-email").value,p=document.getElementById("A-pass").value,n=document.getElementById("A-name").value;if(!e||!p)return;document.getElementById("A-btn").textContent="...";document.getElementById("A-err").classList.add("h");document.getElementById("A-key").classList.add("h");try{const d=await F("auth",{method:"POST",body:{action:S.m,email:e,password:p,full_name:n}});if(d.error){document.getElementById("A-err").textContent=d.error;document.getElementById("A-err").classList.remove("h");document.getElementById("A-btn").textContent=S.m==="login"?"> sign in":"> create account";return;}if(d.api_key){document.getElementById("A-kv").textContent=d.api_key;document.getElementById("A-key").classList.remove("h");S.ak=d.api_key;}S.ss=d;SD();}catch(err){document.getElementById("A-err").textContent=err.message;document.getElementById("A-err").classList.remove("h");document.getElementById("A-btn").textContent=S.m==="login"?"> sign in":"> create account";}}
async function SD(){document.getElementById("V-auth").classList.add("h");document.getElementById("V-dash").classList.remove("h");document.getElementById("D-em").textContent=S.ss?.user?.email||S.ss?.org?.name||"";await LD();RT();RC();}
async function LD(){const[u,p]=await Promise.all([F("usage-check"),F("passport-list")]);if(!u.error)S.u=u;if(!p.error)S.pp=p.passports||[];document.getElementById("D-plan").textContent=S.u?.org?.plan||"beta";}
function RT(){const ts=[{i:"overview",l:"Overview"},{i:"analytics",l:"Analytics"},{i:"passports",l:"Passports ("+S.pp.length+")"},{i:"policies",l:"Policies"},{i:"translate",l:"Translate"},{i:"webhooks",l:"Webhooks"},{i:"keys",l:"API Keys"}];document.getElementById("D-tabs").innerHTML=ts.map(t=>'<button class="tab'+(S.t===t.i?' active':'')+'" onclick="ST(\''+t.i+'\')">'+t.l+'</button>').join("");}
function ST(t){S.t=t;RT();RC();}
function RC(){const c=document.getElementById("D-content");if(S.t==="overview")RO(c);else if(S.t==="analytics")RA(c);else if(S.t==="passports")RP(c);else if(S.t==="policies")RPol(c);else if(S.t==="translate")RR(c);else if(S.t==="webhooks")RWH(c);else if(S.t==="keys")RK(c);}
function SC(icon,label,val,lim,col){const p=lim?Math.min(val/lim*100,100):null;return '<div class="stat-card"><div class="stat-label">'+icon+' '+label+'</div><div class="stat-value" style="color:'+col+'">'+val.toLocaleString()+'</div>'+(p!=null?'<div class="stat-bar"><div class="stat-fill" style="background:'+col+';width:'+p+'%"></div></div><div style="font-size:10px;color:var(--fg3);font-family:var(--mono);margin-top:4px">'+val.toLocaleString()+' / '+lim.toLocaleString()+'</div>':'')+'</div>';}
function IR(k,v){return '<div class="info-row"><span class="k">'+k+'</span><span class="v">'+(v||"–")+'</span></div>';}
function HLP(icon,title,lines){return '<div style="background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.1);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;gap:14px;align-items:flex-start"><div style="font-size:20px;flex-shrink:0;margin-top:2px">'+icon+'</div><div><div style="font-size:13px;font-weight:700;color:var(--cyan);margin-bottom:4px">'+title+'</div><div style="font-size:12px;color:var(--fg2);line-height:1.7">'+lines+'</div></div></div>';}

function RO(c){const u=S.u?.usage||{},o=S.u?.org||{},t=S.u?.totals||{};c.innerHTML=HLP('📊','Welcome to your AIB Dashboard','This is your command center. Here you can see your usage stats, active passports, and endpoint status. <strong>Start by creating your first passport</strong> in the Passports tab, or <strong>generate an API key</strong> in the API Keys tab to start integrating.')+
'<div class="stat-grid">'+SC("▸","Transactions",u.transactions?.used||0,u.transactions?.limit,"var(--cyan)")+SC("+","Passports",t.active_passports||0,u.passports_created?.limit,"var(--blue)")+SC("~","Translations",u.translations?.used||0,null,"var(--yellow)")+SC("#","Receipts",t.total_receipts||0,null,"var(--orange)")+'</div><div class="grid-2"><div class="card"><div class="card-title">Organization</div>'+IR("Name",o.name)+IR("Slug",o.slug)+IR("Plan",o.plan)+IR("Month",S.u?.month)+IR("Retention",(t.audit_retention_days||90)+"d")+'</div><div class="card"><div class="card-title">Endpoints</div>'+["passport-create","passport-list","passport-revoke","translate","usage-check","auth","audit-trail","intent-analyze","vc-issue"].map(e=>'<div style="display:flex;justify-content:space-between;font-size:12px;font-family:var(--mono);padding:5px 0;border-bottom:1px solid rgba(255,255,255,.02)"><span style="color:var(--cyan)">'+e+'</span><span class="tag tag-green">ACTIVE</span></div>').join("")+'</div></div>';}

function RP(c){c.innerHTML=HLP('🪪','Create & manage agent passports','A passport is a <strong>verifiable identity</strong> for your AI agent. Give it a unique slug (e.g. <code style="color:var(--cyan)">booking-bot</code>), choose which protocols it speaks (MCP, A2A), and define its capabilities. Each passport gets an Ed25519-signed receipt as proof of creation.')+

async function RWH(c){c.innerHTML='<div class="card" style="text-align:center;color:var(--fg3)">Loading webhooks...</div>';const data=await F("webhook-manage");const hooks=data.webhooks||[];const validEvents=['passport.created','passport.revoked','policy.violation','translate.completed'];c.innerHTML=HLP('🔔','Get notified when things happen','Webhooks send a real-time HTTP POST to your server when events occur — a passport is created, revoked, or a policy is violated. Add your endpoint URL, select the events you care about, and optionally add an HMAC secret for signature verification.')+'<div class="card"><div class="card-title">Create webhook</div><div style="display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-bottom:12px"><div style="flex:2;min-width:200px"><span class="lbl">URL</span><input id="wh-url" placeholder="https://your-app.com/webhooks" class="inp" style="margin-bottom:0"></div><div style="flex:1;min-width:140px"><span class="lbl">SECRET (optional)</span><input id="wh-secret" placeholder="hmac-secret" class="inp" style="margin-bottom:0"></div></div><span class="lbl">EVENTS</span><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">'+validEvents.map(e=>'<label style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--fg2);font-family:var(--mono);cursor:pointer"><input type="checkbox" class="wh-ev" value="'+e+'" '+(e==="passport.created"||e==="passport.revoked"?"checked":"")+'>'+e+'</label>').join('')+'</div><button onclick="createWH()" class="btn-action">> create webhook</button><div id="wh-msg" class="h" style="font-size:11px;margin-top:8px;font-family:var(--mono)"></div></div><div style="background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--bd);border-radius:14px;overflow:hidden"><div style="display:grid;grid-template-columns:1fr 130px 60px 60px 60px;gap:8px;padding:10px 16px;font-size:10px;color:var(--fg3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd)"><span>URL</span><span>Events</span><span>OK</span><span>Fail</span><span></span></div>'+(hooks.length===0?'<div style="padding:24px;text-align:center;color:var(--fg3);font-size:13px">No webhooks configured</div>':hooks.map(h=>'<div style="display:grid;grid-template-columns:1fr 130px 60px 60px 60px;gap:8px;padding:12px 16px;border-bottom:1px solid var(--bd);align-items:center"><div><div style="color:var(--fg);font-weight:600;font-size:12px;word-break:break-all">'+h.url+'</div><div style="color:var(--fg3);font-size:9px;font-family:var(--mono)">'+(h.last_fired_at?'Last: '+new Date(h.last_fired_at).toLocaleString():'Never fired')+'</div></div><div style="display:flex;gap:2px;flex-wrap:wrap">'+h.events.map(e=>'<span class="tag tag-cyan">'+e.split('.').pop()+'</span>').join('')+'</div><span style="font-size:12px;color:var(--green);font-family:var(--mono);text-align:center">'+h.success_count+'</span><span style="font-size:12px;color:var(--red);font-family:var(--mono);text-align:center">'+h.failure_count+'</span><button class="btn-danger" onclick="delWH(\''+h.id+'\')">delete</button></div>').join(''))+'</div>';}
async function createWH(){const url=document.getElementById('wh-url').value;if(!url)return;const secret=document.getElementById('wh-secret').value;const events=Array.from(document.querySelectorAll('.wh-ev:checked')).map(el=>el.value);if(events.length===0){const m=document.getElementById('wh-msg');m.style.color='var(--red)';m.textContent='Select at least one event';m.classList.remove('h');return;}const body={url,events};if(secret)body.secret=secret;const d=await F('webhook-manage',{method:'POST',body});const m=document.getElementById('wh-msg');m.classList.remove('h');if(d.error){m.style.color='var(--red)';m.textContent=d.error;}else{m.style.color='var(--cyan)';m.textContent='✓ Webhook created';document.getElementById('wh-url').value='';setTimeout(()=>RWH(document.getElementById('D-content')),500);}}

function RK(c){const ks=S.ss?.api_keys||[];c.innerHTML=HLP('🔑','Manage your API keys','API keys authenticate your requests to the AIB API. Use the <code style="color:var(--cyan)">x-api-key</code> header in your calls. You can create multiple keys for different environments (dev, staging, prod). <strong>Keys are shown only once</strong> — save them immediately after generation.')+'<div class="card"><div class="card-title">Generate new API key</div><div style="display:flex;gap:10px;align-items:end"><div style="flex:1"><span class="lbl">KEY NAME</span><input id="gk-n" placeholder="My integration" class="inp" style="margin-bottom:0"></div><button onclick="GK()" class="btn-action">> generate</button></div><div id="gk-r" class="h key-box" style="margin-top:14px"><div class="key-label">Save this key now:</div><code id="gk-v"></code></div></div><div id="gk-list" style="background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--bd);border-radius:14px;overflow:hidden"><div style="padding:10px 16px;font-size:10px;color:var(--fg3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd)">Active API keys</div>'+(ks.length===0?'<div style="padding:24px;text-align:center;color:var(--fg3);font-size:13px">No keys found</div>':ks.map(k=>'<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--bd);font-size:12px"><div><div style="color:var(--fg);font-weight:600">'+k.name+'</div><div style="color:var(--fg3);font-family:var(--mono);font-size:10px">'+k.key_preview+'</div></div><div style="color:var(--fg3);font-size:10px">'+(k.last_used_at?new Date(k.last_used_at).toLocaleDateString():"Never used")+'</div></div>').join(""))+'</div>';}
async function GK(){const n=document.getElementById("gk-n").value||"API Key";const body={action:"generate_key",key_name:n};if(S.ak)body.api_key=S.ak;if(S.ss?.access_token)body.access_token=S.ss.access_token;try{const d=await F("auth",{method:"POST",body});if(d.error){document.getElementById("gk-r").classList.remove("h");document.getElementById("gk-v").textContent="Error: "+d.error;return;}if(d.api_key){document.getElementById("gk-v").textContent=d.api_key;document.getElementById("gk-r").classList.remove("h");if(!S.ss.api_keys)S.ss.api_keys=[];S.ss.api_keys.push({id:'new-'+Date.now(),name:n,key_prefix:d.api_key.substring(0,18),key_preview:d.api_key.substring(0,18)+'...',status:'active',last_used_at:null});RK(document.getElementById("D-content"));document.getElementById("gk-r").classList.remove("h");document.getElementById("gk-v").textContent=d.api_key;}}catch(e){document.getElementById("gk-r").classList.remove("h");document.getElementById("gk-v").textContent="Error: "+e.message;}}
async function RPol(c){c.innerHTML='<div class="card" style="text-align:center;color:var(--fg3)">Loading policies...</div>';const data=await F("policy-manage");const rules=data.rules||[];const typeColors={deliverable_gate:'var(--yellow)',separation_of_duties:'var(--red)',attestation_required:'var(--green)',capability_required:'var(--blue)',domain_block:'var(--red)',protocol_restrict:'var(--orange)',tier_restrict:'var(--fg2)',rate_limit:'var(--orange)'};c.innerHTML=HLP('🛡️','Define rules for your agents','Policies are <strong>guardrails</strong> evaluated on every passport operation. For example: require a specific capability before creating a passport, block certain protocols, or enforce human oversight. Choose a rule type, set severity (block/warn/log), and configure via JSON.')+'<div class="card"><div class="card-title">Create policy rule</div><div style="display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-bottom:12px"><div style="flex:1;min-width:160px"><span class="lbl">RULE TYPE</span><select id="pol-type" onchange="polTypeChange()" class="inp" style="margin-bottom:0"><option value="deliverable_gate">deliverable_gate</option><option value="separation_of_duties">separation_of_duties</option><option value="attestation_required">attestation_required</option><option value="capability_required">capability_required</option><option value="domain_block">domain_block</option><option value="protocol_restrict">protocol_restrict</option></select></div><div style="flex:1;min-width:160px"><span class="lbl">SEVERITY</span><select id="pol-sev" class="inp" style="margin-bottom:0"><option value="block">block</option><option value="warn">warn</option><option value="log">log</option></select></div></div><span class="lbl">DESCRIPTION</span><input id="pol-desc" placeholder="Require tests_passed capability" class="inp"><span class="lbl">CONFIG (JSON)</span><textarea id="pol-cfg" rows="3" style="width:100%;padding:12px;background:var(--bg);border:1px solid var(--bd);border-radius:10px;color:var(--cyan);font-size:11px;font-family:var(--mono);resize:vertical;outline:none">{"required_capabilities": ["tests_passed"], "action": "create"}</textarea><div style="display:flex;gap:10px;margin-top:12px"><button onclick="createPolicy()" class="btn-action">&gt; create rule</button><button onclick="testPolicy()" class="btn-outline" style="border-color:rgba(245,158,11,.3);color:var(--yellow)">&gt; test policy</button></div><div id="pol-msg" style="font-size:11px;margin-top:8px;font-family:var(--mono)"></div></div><div style="background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--bd);border-radius:14px;overflow:hidden"><div style="display:grid;grid-template-columns:1fr 130px 60px 50px 60px;gap:8px;padding:10px 16px;font-size:10px;color:var(--fg3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd)"><span>Rule</span><span>Type</span><span>Sev</span><span>Hits</span><span></span></div>'+(rules.length===0?'<div style="padding:24px;text-align:center;color:var(--fg3);font-size:13px">No policy rules yet</div>':rules.map(r=>{const col=typeColors[r.rule_type]||'var(--fg2)';return '<div style="display:grid;grid-template-columns:1fr 130px 60px 50px 60px;gap:8px;padding:12px 16px;border-bottom:1px solid var(--bd);align-items:center"><div><div style="color:var(--fg);font-weight:600;font-size:13px">'+(r.description||r.rule_id)+'</div><div style="color:var(--fg3);font-size:10px;font-family:var(--mono)">'+r.rule_id+'</div></div><span style="font-size:10px;padding:2px 6px;border-radius:4px;font-family:var(--mono);font-weight:600;background:rgba(255,255,255,.03);color:'+col+'">'+r.rule_type+'</span><span style="font-size:10px;color:'+(r.severity==='block'?'var(--red)':'var(--yellow)')+';font-family:var(--mono)">'+r.severity+'</span><span style="font-size:12px;color:var(--fg);font-family:var(--mono);text-align:center">'+(r.hits||0)+'</span><button class="btn-danger" onclick="delPolicy(\''+r.rule_id+'\')">delete</button></div>';}).join(''))+'</div><div id="pol-test-result" style="margin-top:16px"></div>';}
const POL_TEMPLATES={deliverable_gate:{cfg:'{"required_capabilities": ["tests_passed"], "action": "create"}',desc:'Require tests_passed capability'},separation_of_duties:{cfg:'{"blocked_self_actions": ["revoke"], "strict": true}',desc:'Block self-revoke'},attestation_required:{cfg:'{"actions": ["create", "revoke"]}',desc:'Sign all create/revoke receipts'},capability_required:{cfg:'{"required": ["deploy"]}',desc:'Require deploy capability'},domain_block:{cfg:'{"blocked_domains": ["untrusted.com"]}',desc:'Block untrusted domain'},protocol_restrict:{cfg:'{"blocked_protocols": ["anp"]}',desc:'Block ANP protocol'}};
function polTypeChange(){const t=document.getElementById('pol-type').value;const tmpl=POL_TEMPLATES[t]||{cfg:'{}',desc:''};document.getElementById('pol-cfg').value=tmpl.cfg;document.getElementById('pol-desc').value=tmpl.desc;}
async function createPolicy(){const ruleType=document.getElementById('pol-type').value;const severity=document.getElementById('pol-sev').value;const desc=document.getElementById('pol-desc').value;const cfgStr=document.getElementById('pol-cfg').value;const msg=document.getElementById('pol-msg');try{const config=JSON.parse(cfgStr);const d=await F('policy-manage',{method:'POST',body:{rule_type:ruleType,config,description:desc,severity}});msg.style.color=d.error?'var(--red)':'var(--cyan)';msg.textContent=d.error||'✓ '+d.rule_id;if(!d.error)setTimeout(()=>RPol(document.getElementById('D-content')),800);}catch(e){msg.style.color='var(--red)';msg.textContent='Invalid JSON: '+e.message;}}
