<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#0a0a1a"/>

  <!-- Brain - left hemisphere (organic) -->
  <g fill="none" stroke="url(#grad1)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Outer brain left -->
    <path d="M200 80 C160 78, 120 90, 105 115 C88 142, 88 170, 95 192 C102 215, 95 235, 100 255 C108 278, 125 295, 148 302 C165 308, 182 305, 195 300 L195 85 Z"/>
    <!-- Brain folds left -->
    <path d="M155 105 C140 118, 130 135, 135 155"/>
    <path d="M120 140 C112 155, 112 172, 118 188"/>
    <path d="M140 190 C130 205, 132 222, 142 235"/>
    <path d="M165 235 C155 248, 155 262, 162 272"/>
    <path d="M145 160 C138 172, 140 185, 148 194"/>
    <path d="M175 120 C165 132, 162 148, 168 162"/>
    <!-- Corpus callosum -->
    <line x1="195" y1="80" x2="195" y2="305" stroke="url(#grad1)" stroke-width="2"/>
  </g>

  <!-- Circuit - right hemisphere (digital) -->
  <g fill="none" stroke="url(#grad2)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Outer border right -->
    <path d="M205 85 L205 300 C218 305, 235 308, 252 302 C275 295, 292 278, 300 255 C305 235, 298 215, 305 192 C312 170, 312 142, 295 115 C280 90, 240 78, 205 80 Z"/>

    <!-- Circuit lines horizontal -->
    <line x1="205" y1="130" x2="260" y2="130"/>
    <line x1="260" y1="130" x2="260" y2="155"/>
    <line x1="260" y1="155" x2="295" y2="155"/>

    <line x1="205" y1="185" x2="245" y2="185"/>
    <line x1="245" y1="185" x2="245" y2="165"/>
    <line x1="245" y1="165" x2="290" y2="165"/>

    <line x1="205" y1="230" x2="255" y2="230"/>
    <line x1="255" y1="230" x2="255" y2="210"/>
    <line x1="255" y1="210" x2="300" y2="210"/>

    <line x1="205" y1="270" x2="250" y2="270"/>
    <line x1="250" y1="270" x2="250" y2="250"/>
    <line x1="250" y1="250" x2="285" y2="250"/>

    <!-- Circuit nodes (circles) -->
    <circle cx="295" cy="155" r="8" fill="#00d4ff" stroke="none" filter="url(#glow)"/>
    <circle cx="290" cy="165" r="6" fill="#3b82f6" stroke="none" filter="url(#glow)"/>
    <circle cx="300" cy="210" r="8" fill="#00d4ff" stroke="none" filter="url(#glow)"/>
    <circle cx="285" cy="250" r="6" fill="#3b82f6" stroke="none" filter="url(#glow)"/>
  </g>

  <!-- AIB text -->
  <text x="200" y="358"
    font-family="'Space Mono', 'JetBrains Mono', monospace"
    font-size="52"
    font-weight="700"
    text-anchor="middle"
    letter-spacing="8"
    fill="url(#grad1)"
    filter="url(#glow)">AIB</text>
</svg>
