<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--fg:#f0f2ff;--fg2:#a0a5c8;--fg3:#6b70a0;--cyan:#00d4ff;--blue:#3b82f6;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#a855f7;--bd:rgba(255,255,255,.08);--glass:rgba(15,16,41,.6);--sans:'Plus Jakarta Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace}
html{scroll-behavior:smooth}body{font-family:var(--sans);background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;font-size:18px;line-height:1.8;min-height:100vh}
a{color:var(--cyan);text-decoration:none;transition:.2s}a:hover{color:#fff}
.w{max-width:820px;margin:0 auto;padding:0 24px}
.hdr{padding:24px 0;border-bottom:1px solid var(--bd)}
.hdr .w{display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--cyan),var(--blue));display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:700;color:#fff}
.logo-text{font-weight:700;font-size:17px;color:var(--fg);letter-spacing:-.3px}
.hdr-links{display:flex;gap:16px;align-items:center}
.hdr-link{font-size:13px;color:var(--fg3);font-family:var(--mono);cursor:pointer}
.lang-btn{background:var(--glass);border:1px solid var(--bd);border-radius:6px;padding:4px 12px;font-family:var(--mono);font-size:12px;color:var(--fg2);cursor:pointer;transition:.2s}
.lang-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.hero{padding:52px 0 28px;text-align:center}
.status-dot{width:16px;height:16px;border-radius:50%;display:inline-block;margin-right:12px;vertical-align:middle}
.status-dot.ok{background:var(--green);box-shadow:0 0 16px rgba(34,197,94,.4)}
.status-dot.warn{background:var(--amber);box-shadow:0 0 16px rgba(245,158,11,.4)}
.status-dot.down{background:var(--red);box-shadow:0 0 16px rgba(239,68,68,.4)}
.status-dot.loading{background:var(--fg3);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.hero h1{font-size:28px;font-weight:800;margin-bottom:8px;letter-spacing:-.5px}
.hero p{color:var(--fg2);font-size:16px}
.hero .uptime-badge{display:inline-block;margin-top:18px;font-family:var(--mono);font-size:26px;font-weight:700;letter-spacing:-.5px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:36px}
.stat{background:var(--glass);border:1px solid var(--bd);border-radius:14px;padding:20px;text-align:center;backdrop-filter:blur(8px)}
.stat .val{font-size:24px;font-weight:800;font-family:var(--mono)}
.stat .lab{font-size:11px;color:var(--fg3);text-transform:uppercase;letter-spacing:1px;margin-top:4px;font-family:var(--mono)}
.stat .hint{font-size:12px;color:var(--fg3);margin-top:8px;line-height:1.4}
.section{margin-bottom:36px}
.section-title{font-size:13px;color:var(--fg3);font-family:var(--mono);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-title .info{font-size:12px;color:var(--fg3);font-family:var(--sans);text-transform:none;letter-spacing:0;font-weight:400}
.section-desc{font-size:14px;color:var(--fg3);margin-bottom:14px;line-height:1.6}
.card{background:var(--glass);border:1px solid var(--bd);border-radius:16px;overflow:hidden;backdrop-filter:blur(8px)}
.ep{display:grid;grid-template-columns:1fr auto auto;gap:14px;padding:16px 20px;border-bottom:1px solid var(--bd);align-items:center}
.ep:last-child{border-bottom:none}
.ep-name{font-weight:700;font-size:15px}
.ep-desc{font-size:12px;color:var(--fg3);margin-top:3px}
.ep-latency{font-family:var(--mono);font-size:14px;color:var(--fg2);text-align:right}
.ep-badge{font-family:var(--mono);font-size:12px;font-weight:700;padding:4px 14px;border-radius:8px;text-align:center;min-width:70px}
.ep-badge.ok{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.ep-badge.warn{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.ep-badge.down{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.agent{display:grid;grid-template-columns:auto 1fr auto;gap:14px;padding:14px 20px;border-bottom:1px solid var(--bd);align-items:center}
.agent:last-child{border-bottom:none}
.agent-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.agent-name{font-weight:700;font-size:15px}
.agent-info{font-size:12px;color:var(--fg3);margin-top:2px;line-height:1.4}
.agent-sched{font-family:var(--mono);font-size:12px;color:var(--fg2);text-align:right;white-space:nowrap}
.agent-sched .freq{display:block;font-size:10px;color:var(--fg3);margin-top:2px}
.metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.metric{background:var(--glass);border:1px solid var(--bd);border-radius:12px;padding:18px;backdrop-filter:blur(8px)}
.metric .val{font-size:22px;font-weight:800;font-family:var(--mono)}
.metric .lab{font-size:10px;color:var(--fg3);text-transform:uppercase;letter-spacing:.5px;margin-top:3px;font-family:var(--mono)}
.metric .hint{font-size:12px;color:var(--fg3);margin-top:8px;line-height:1.4}
.alert{background:rgba(239,68,68,.04);border:1px solid rgba(239,68,68,.12);border-radius:12px;padding:14px 18px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.alert-msg{font-size:15px;color:var(--fg2)}
.alert-time{font-size:12px;color:var(--fg3);font-family:var(--mono);white-space:nowrap}
.no-alerts{background:rgba(34,197,94,.04);border:1px solid rgba(34,197,94,.1);border-radius:12px;padding:18px 20px;text-align:center;color:var(--green);font-size:15px}
.explainer{background:rgba(0,212,255,.03);border:1px solid rgba(0,212,255,.08);border-radius:14px;padding:22px;margin-bottom:36px}
.explainer h3{font-size:16px;font-weight:700;margin-bottom:12px;color:var(--cyan)}
.explainer p{font-size:14px;color:var(--fg2);line-height:1.7;margin-bottom:8px}
.explainer p:last-child{margin-bottom:0}
.explainer strong{color:var(--fg)}
.ftr{padding:28px 0;border-top:1px solid var(--bd);text-align:center}
.ftr p{font-size:13px;color:var(--fg3)}
.ftr a{color:var(--fg2)}
.refresh-info{font-size:12px;color:var(--fg3);font-family:var(--mono);text-align:center;margin-bottom:28px}
.skel{background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.06) 50%,rgba(255,255,255,.03) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;height:18px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.metrics-grid{grid-template-columns:1fr 1fr}.ep{grid-template-columns:1fr auto}.ep-latency{display:none}.agent{grid-template-columns:auto 1fr}.agent-sched{display:none}}
</style>
</head>

  'passport-revoke':"Révoque un passeport agent — irréversible, tracé dans l'audit trail",
  'translate':'Convertit les credentials entre les formats MCP, A2A, AG-UI et ANP',
  'usage-check':"Retourne l'usage actuel vs les limites du plan",
  'auth':"Gère l'inscription, la connexion, OAuth (GitHub/Google), génération de clés API",
}};

function toggleLang(){lang=lang==='en'?'fr':'en';localStorage.setItem('aib-lang',lang);document.getElementById('lang-toggle').textContent=lang==='en'?'FR':'EN';renderI18n();load();}

function renderI18n(){
  const t=T[lang];
  document.getElementById('lang-toggle').textContent=lang==='en'?'FR':'EN';
  document.getElementById('s-explainer').innerHTML='<h3>'+t.explainerTitle+'</h3><p>'+t.exp1+'</p><p>'+t.exp2+'</p><p>'+t.exp3+'</p><p>'+t.exp4+'</p>';
  document.getElementById('st-ep').innerHTML=t.stEp+' <span class="info">— '+t.stEpInfo+'</span>';
  document.getElementById('sd-ep').textContent=t.sdEp;
  document.getElementById('st-agents').innerHTML=t.stAgents+' <span class="info">— '+t.stAgentsInfo+'</span>';
  document.getElementById('sd-agents').textContent=t.sdAgents;
  document.getElementById('st-platform').innerHTML=t.stPlatform+' <span class="info">— '+t.stPlatformInfo+'</span>';
  document.getElementById('sd-platform').textContent=t.sdPlatform;
  document.getElementById('st-alerts').innerHTML=t.stAlerts;
  document.getElementById('sd-alerts').textContent=t.sdAlerts;
  // Agents
  document.getElementById('s-agents').innerHTML=t.agents.map(function(a){
    return '<div class="agent"><div class="agent-icon" style="background:'+a.bg+'">'+a.icon+'</div><div><div class="agent-name">'+a.name+'</div><div class="agent-info">'+a.info+'</div></div><div class="agent-sched">'+a.sched+'<span class="freq">'+a.freq+'</span></div></div>';
  }).join('');
}

async function load(){
  try{const r=await fetch(API);const d=await r.json();render(d);}
  catch(e){const t=T[lang];document.getElementById('s-dot').className='status-dot down';document.getElementById('s-title').textContent=t.unreachable;document.getElementById('s-sub').textContent=t.unreachableSub;}
}

function render(d){
  const t=T[lang];const dot=document.getElementById('s-dot'),title=document.getElementById('s-title'),sub=document.getElementById('s-sub'),uptime=document.getElementById('s-uptime');
  if(d.status==='all_healthy'){dot.className='status-dot ok';title.textContent=t.allOp;sub.textContent=t.allOpSub;}
  else if(d.status==='degraded'){dot.className='status-dot warn';title.textContent=t.degraded;sub.textContent=t.degradedSub;}
  else if(d.status==='no_data'){dot.className='status-dot warn';title.textContent=t.starting;sub.textContent=d.message||'...';}
  else{dot.className='status-dot down';title.textContent=t.down;sub.textContent=t.downSub;}
  if(d.uptime_24h){uptime.style.display='';var pu=parseFloat(d.uptime_24h);uptime.textContent=d.uptime_24h+' uptime (24h)';uptime.style.color=pu>=99?'var(--green)':pu>=95?'var(--amber)':'var(--red)';}
  var pct=d.uptime_24h||'--';var pv=parseFloat(pct);
  document.getElementById('s-stats').innerHTML=
    '<div class="stat"><div class="val" style="color:'+(pv>=99?'var(--green)':pv>=95?'var(--amber)':'var(--red)')+'">'+pct+'</div><div class="lab">'+t.uptime+'</div><div class="hint">'+t.uptimeHint+'</div></div>'+
    '<div class="stat"><div class="val" style="color:var(--cyan)">'+(d.total_checks||0)+'</div><div class="lab">'+t.checks+'</div><div class="hint">'+t.checksHint+'</div></div>'+
    '<div class="stat"><div class="val" style="color:var(--blue)">'+(d.avg_latency_ms||0)+'<span style="font-size:13px;color:var(--fg3)">ms</span></div><div class="lab">'+t.latency+'</div><div class="hint">'+(d.avg_latency_ms<500?t.excellent:t.normal)+'</div></div>'+
    '<div class="stat"><div class="val" style="color:'+(d.unacknowledged_alerts>0?'var(--red)':'var(--green)')+'">'+(d.unacknowledged_alerts||0)+'</div><div class="lab">'+t.alerts+'</div><div class="hint">'+(d.unacknowledged_alerts>0?t.needsAttention:t.allClear)+'</div></div>';
  if(d.endpoints&&d.endpoints.length>0){
    var descs=EP_DESC[lang]||EP_DESC.en;
    document.getElementById('s-endpoints').innerHTML=d.endpoints.map(function(ep){
      var p=parseFloat(ep.uptime);var cls=p>=99?'ok':p>=90?'warn':'down';var desc=descs[ep.name]||'';
      return '<div class="ep"><div><div class="ep-name">'+ep.name+'</div>'+(desc?'<div class="ep-desc">'+desc+'</div>':'')+'</div><div class="ep-latency">'+ep.avg_latency_ms+'<span style="font-size:12px;color:var(--fg3)">ms</span></div><div class="ep-badge '+cls+'">'+ep.uptime+'</div></div>';
    }).join('');
  }
  var tp=d.endpoints?d.endpoints.reduce(function(s,e){return s+(e.checks||0)},0):0;
  document.getElementById('s-platform').innerHTML=
    '<div class="metric"><div class="val" style="color:var(--cyan)">'+tp+'</div><div class="lab">'+t.totalPings+'</div><div class="hint">'+t.totalPingsH+'</div></div>'+
    '<div class="metric"><div class="val" style="color:var(--green)">30</div><div class="lab">'+t.edgeFn+'</div><div class="hint">'+t.edgeFnH+'</div></div>'+
    '<div class="metric"><div class="val" style="color:var(--blue)">12</div><div class="lab">'+t.cronJobs+'</div><div class="hint">'+t.cronH+'</div></div>'+
    '<div class="metric"><div class="val" style="color:var(--purple)">10</div><div class="lab">'+t.aiAgents+'</div><div class="hint">'+t.agentsH+'</div></div>'+
    '<div class="metric"><div class="val" style="color:var(--amber)">10</div><div class="lab">'+t.mcpTools+'</div><div class="hint">'+t.mcpH+'</div></div>'+
    '<div class="metric"><div class="val" style="color:var(--cyan)">3</div><div class="lab">'+t.plans+'</div><div class="hint">'+t.plansH+'</div></div>';
  if(d.alerts&&d.alerts.length>0){document.getElementById('s-alerts-section').style.display='';document.getElementById('s-no-alerts').style.display='none';document.getElementById('s-alerts').innerHTML=d.alerts.map(function(a){return '<div class="alert"><span class="alert-msg">'+a.message+'</span><span class="alert-time">'+new Date(a.created_at).toLocaleString()+'</span></div>';}).join('');}
  else{document.getElementById('s-alerts-section').style.display='none';document.getElementById('s-no-alerts').style.display='';document.getElementById('s-no-alerts').innerHTML='<div class="no-alerts">'+t.noAlerts+'</div><br>';}
  document.getElementById('s-refresh').textContent=t.refreshPrefix+' '+new Date().toLocaleTimeString()+' · '+t.refreshSuffix;
}

renderI18n();load();setInterval(load,60000);
</script>
</body>
</html>
