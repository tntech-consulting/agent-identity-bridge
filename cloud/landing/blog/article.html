<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading... — AIB Blog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--bg2:#0f1029;--fg:#f0f2ff;--fg2:#a0a5c8;--fg3:#5e6388;--cyan:#00d4ff;--cyan-dim:rgba(0,212,255,.06);--cyan-glow:rgba(0,212,255,.15);--blue:#3b82f6;--bd:rgba(255,255,255,.06);--glass:rgba(15,16,41,.6);--sans:'Plus Jakarta Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace}
body{font-family:var(--sans);background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;font-size:16px;line-height:1.75}
a{color:var(--cyan);text-decoration:none;transition:.2s}a:hover{color:#fff}
.w{max-width:800px;margin:0 auto;padding:0 28px}
nav{padding:12px 0;position:sticky;top:0;z-index:100;background:rgba(10,10,26,.82);backdrop-filter:blur(24px) saturate(1.4);border-bottom:1px solid var(--bd)}
nav .w{max-width:1120px;display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center;gap:10px}.logo-img{width:36px;height:36px;border-radius:8px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(139,92,246,.3))}.logo-text{font-weight:700;font-size:17px;background:linear-gradient(135deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.back-link{font-family:var(--mono);font-size:13px;color:var(--cyan);display:inline-block;margin:40px 0 24px}
.back-link:hover{color:#fff}
.article-header{margin-bottom:32px}
.article-header h1{font-size:32px;font-weight:800;line-height:1.3;margin-bottom:12px;letter-spacing:-1px}
.meta{font-family:var(--mono);font-size:12px;color:var(--fg3);margin-bottom:16px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.tag-list{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:32px}
.tag{display:inline-block;font-family:var(--mono);font-size:10px;color:var(--cyan);background:var(--cyan-dim);border:1px solid var(--cyan-glow);padding:3px 10px;border-radius:4px;letter-spacing:.5px}
.article-body{font-size:16px;line-height:1.85;color:var(--fg2)}
.article-body h2{font-family:var(--sans);font-weight:700;font-size:22px;color:var(--fg);margin:36px 0 16px;letter-spacing:-.5px}
.article-body h3{font-family:var(--sans);font-weight:600;font-size:18px;color:var(--fg);margin:28px 0 12px}
.article-body p{margin-bottom:16px}
.article-body a{color:var(--cyan);text-decoration:underline;text-underline-offset:3px}
.article-body code{font-family:var(--mono);font-size:14px;background:rgba(0,212,255,.06);padding:2px 7px;border-radius:4px;color:var(--cyan)}
.article-body pre{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:20px;overflow-x:auto;margin:20px 0;font-size:13px;line-height:1.6}
.article-body pre code{background:none;padding:0;color:var(--fg2)}
.article-body ul,.article-body ol{margin:12px 0 16px 24px}
.article-body li{margin-bottom:8px}
.article-body blockquote{border-left:3px solid var(--cyan);padding-left:16px;margin:20px 0;color:var(--fg3);font-style:italic}
.article-body strong{color:var(--fg);font-weight:600}
.loading{text-align:center;padding:100px 0;color:var(--fg3);font-size:16px}
.error-state{text-align:center;padding:100px 0}
.error-state h2{color:var(--fg);font-size:24px;margin-bottom:12px}
.error-state p{color:var(--fg3)}
footer{border-top:1px solid var(--bd);padding:24px 0;text-align:center;background:rgba(10,10,26,.5);margin-top:80px}footer p{font-size:11px;color:var(--fg3)}footer a{color:var(--fg2)}footer a:hover{color:var(--cyan)!important}
@media(max-width:768px){.article-header h1{font-size:24px}.logo-text{display:none}}
</style>
</head>
<body>
<nav><div class="w" style="max-width:1120px">
<a href="/" class="logo"><img src="/aib-logo.png" alt="AIB" class="logo-img"><span class="logo-text">Agent Identity Bridge</span></a>
<a href="/blog" style="font-family:var(--mono);font-size:13px;color:var(--fg2)">← Blog</a>
</div></nav>

<div class="w">
<a href="/blog" class="back-link">← Back to all articles</a>
<div id="article-container">
<div class="loading">Loading article...</div>
</div>
</div>

<footer><div class="w" style="max-width:1120px"><p>&copy; 2026 TNTECH CONSULTING SAS — Paris — <a href="/">AIB</a> · <a href="/cgv">Terms</a> · Apache 2.0</p></div></footer>

<script>
var slug=window.location.pathname.replace('/blog/','').replace(/\/$/,'').replace('.html','');
var lang=localStorage.getItem('aib-lang')||'en';

function mdToHtml(md){
  return md
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h2>$1</h2>')
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/```(\w+)?\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^[-*] (.+)$/gm,'<li>$1</li>')
    .replace(/\n\n/g,'</p><p>');
}

if(slug){
  fetch('https://vempwtzknixfnvysmiwo.supabase.co/functions/v1/blog-api?slug='+encodeURIComponent(slug)+'&lang='+lang)
    .then(function(r){return r.json()})
    .then(function(p){
      if(p.error){
        document.getElementById('article-container').innerHTML='<div class="error-state"><h2>Article not found</h2><p>This article may have been moved or removed.</p><p style="margin-top:16px"><a href="/blog">← Back to Blog</a></p></div>';
        return;
      }
      document.title=p.title+' — AIB Blog';
      var date=p.published_at?new Date(p.published_at).toLocaleDateString(lang==='fr'?'fr':'en',{year:'numeric',month:'long',day:'numeric'}):'';
      var tagsHtml=(p.tags||[]).map(function(t){return '<span class="tag">'+t+'</span>'}).join('');
      var contentHtml=p.content||'';
      if(contentHtml.indexOf('<')===-1) contentHtml='<p>'+mdToHtml(contentHtml)+'</p>';

      document.getElementById('article-container').innerHTML=
        '<div class="article-header">'+
          '<h1>'+p.title+'</h1>'+
          '<div class="meta">'+
            '<span>'+date+'</span>'+
            (p.author?'<span>by '+p.author+'</span>':'')+
            (p.read_time_min?'<span>'+p.read_time_min+' min read</span>':'')+
            (p.views?'<span>'+p.views+' views</span>':'')+
          '</div>'+
          '<div class="tag-list">'+tagsHtml+'</div>'+
        '</div>'+
        '<div class="article-body">'+contentHtml+'</div>';
    })
    .catch(function(){
      document.getElementById('article-container').innerHTML='<div class="error-state"><h2>Error loading article</h2><p><a href="/blog">← Back to Blog</a></p></div>';
    });
}else{
  window.location.href='/blog';
}
</script>
</body>
</html>
