[[headers]]
  for = "/*"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Content-Type = "image/svg+xml"

[[headers]]
  for = "/agents/*/did.json"
  [headers.values]
    Content-Type = "application/did+json"
    Access-Control-Allow-Origin = "*"

# W3C DID:web Resolution
[[redirects]]
  from = "/agents/:agent/did.json"
  to = "https://vempwtzknixfnvysmiwo.supabase.co/functions/v1/did-resolve?agent=:agent"
  status = 200
  force = true

[[redirects]]
  from = "/.well-known/did.json"
  to = "https://vempwtzknixfnvysmiwo.supabase.co/functions/v1/did-resolve?agent=root"
  status = 200
  force = true

