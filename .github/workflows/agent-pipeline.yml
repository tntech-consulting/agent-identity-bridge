name: 🤖 AI Agent Pipeline — Coder · Tester · Publisher

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publier sur PyPI si les tests passent ?'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      bump:
        description: 'Type de bump de version'
        required: false
        default: 'patch'
        type: choice
        options: ['patch', 'minor', 'major']

env:
  PYTHON_VERSION: '3.12'
  MAX_RETRY: 3   # Nombre max de cycles Coder → Tester

jobs:

  # ─────────────────────────────────────────────────────────────
  # 🔧 CODER AGENT (round 1) — Analyse préventive avant les tests
  # ─────────────────────────────────────────────────────────────
  coder-agent-r1:
    name: 🔧 Coder Agent (round 1)
    runs-on: ubuntu-latest
    outputs:
      fixes_applied: ${{ steps.coder.outputs.fixes_applied }}
      fixes_count: ${{ steps.coder.outputs.fixes_count }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" || pip install -e .
          pip install ruff pyflakes

      - name: Static analysis
        run: |
          echo "=== RUFF ===" > analysis.txt
          python -m ruff check aib/ --output-format=text 2>&1 | head -100 >> analysis.txt || true
          echo "=== PYFLAKES ===" >> analysis.txt
          python -m pyflakes aib/ 2>&1 | head -50 >> analysis.txt || true
          cat analysis.txt

      - name: 🤖 Claude Coder Agent — Analyse et corrections
        id: coder
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYTHON'
          import os, json, urllib.request, re

          api_key = os.environ.get("ANTHROPIC_API_KEY", "")
          if not api_key:
              print("No API key — skipping")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("fixes_applied=false\nfixes_count=0\n")
              exit(0)

          try:
              with open("analysis.txt") as f:
                  static_analysis = f.read()
          except:
              static_analysis = ""

          source_files = {}
          for filepath in ["aib/cloud.py", "aib/passport.py", "aib/translator.py", "aib/policy_engine.py"]:
              try:
                  with open(filepath) as f:
                      source_files[filepath] = f.read()[:2500]
              except:
                  pass

          source_summary = "\n\n".join([f"### {p}\n```python\n{c}\n```" for p, c in source_files.items()])

          prompt = f"""Tu es le Coder Agent du pipeline CI/CD AIB. Analyse préventive du code AVANT les tests.

ANALYSE STATIQUE:
{static_analysis[:2000]}

SOURCE FILES:
{source_summary[:3000]}

Identifie uniquement les bugs certains (pas les warnings de style).
Réponds en JSON strict:
{{
  "fixes": [
    {{
      "file": "aib/xxx.py",
      "type": "bug|refactor",
      "description": "Description courte",
      "priority": "high|medium|low"
    }}
  ],
  "summary": "Résumé en 1 phrase",
  "recommendation": "APPLY_FIXES|NO_FIXES_NEEDED"
}}"""

          try:
              payload = json.dumps({
                  "model": "claude-sonnet-4-20250514",
                  "max_tokens": 1000,
                  "messages": [{"role": "user", "content": prompt}]
              }).encode()
              req = urllib.request.Request(
                  "https://api.anthropic.com/v1/messages",
                  data=payload,
                  headers={"Content-Type": "application/json", "x-api-key": api_key, "anthropic-version": "2023-06-01"}
              )
              with urllib.request.urlopen(req, timeout=90) as resp:
                  result = json.loads(resp.read())
                  response_text = result["content"][0]["text"]

              json_match = re.search(r'\{.*\}', response_text, re.DOTALL)
              analysis = json.loads(json_match.group()) if json_match else {"fixes": [], "recommendation": "NO_FIXES_NEEDED", "summary": "OK"}

              with open("coder-r1-analysis.json", "w") as f:
                  json.dump(analysis, f, ensure_ascii=False, indent=2)

              fixes_count = len(analysis.get("fixes", []))
              print(f"🔧 Coder Agent R1: {fixes_count} fix(es) identified")
              print(json.dumps(analysis, indent=2, ensure_ascii=False))

              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"fixes_applied={'true' if fixes_count > 0 else 'false'}\n")
                  f.write(f"fixes_count={fixes_count}\n")

          except Exception as e:
              print(f"Error: {e}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("fixes_applied=false\nfixes_count=0\n")
          PYTHON

      - name: Publish R1 summary
        if: always()
        run: |
          echo "## 🔧 Coder Agent — Round 1" >> $GITHUB_STEP_SUMMARY
          if [ -f coder-r1-analysis.json ]; then
            python3 -c "
          import json
          with open('coder-r1-analysis.json') as f: d = json.load(f)
          print(f'**{d.get(\"summary\", \"\")}**')
          for fix in d.get('fixes', []):
              print(f'- [{fix[\"priority\"].upper()}] \`{fix[\"file\"]}\`: {fix[\"description\"]}')
          print(f'\n**Recommendation:** {d.get(\"recommendation\", \"\")}')
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          fi

  # ─────────────────────────────────────────────────────────────
  # 🧪 TESTER AGENT (round 1)
  # ─────────────────────────────────────────────────────────────
  tester-agent-r1:
    name: 🧪 Tester Agent (round 1)
    runs-on: ubuntu-latest
    needs: coder-agent-r1
    outputs:
      tests_passed: ${{ steps.evaluate.outputs.tests_passed }}
      test_report: ${{ steps.evaluate.outputs.test_report }}
      coverage: ${{ steps.evaluate.outputs.coverage }}
      failures_detail: ${{ steps.evaluate.outputs.failures_detail }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" || pip install -e .
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        id: pytest
        run: |
          python -m pytest tests/ -v --tb=long \
            -k "not integration" \
            --junitxml=test-results.xml \
            --cov=aib --cov-report=json:coverage.json \
            2>&1 | tee pytest-output.txt
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-r1
          path: |
            test-results.xml
            pytest-output.txt
            coverage.json

      - name: 🤖 Claude Tester Agent — Analyse
        id: evaluate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYTHON'
          import os, json, urllib.request

          try:
              with open("pytest-output.txt") as f:
                  pytest_output = f.read()
          except:
              pytest_output = "No output"

          try:
              with open("coverage.json") as f:
                  cov_data = json.load(f)
              coverage_pct = round(cov_data.get("totals", {}).get("percent_covered", 0), 1)
          except:
              coverage_pct = 0

          # Détecter échecs
          failed_count = 0
          for line in pytest_output.split("\n"):
              if " failed" in line and ("passed" in line or "error" in line):
                  try:
                      failed_count = int(line.strip().split(" failed")[0].split()[-1])
                  except:
                      pass
          tests_passed = failed_count == 0 and "passed" in pytest_output

          # Extraire les détails des échecs pour le Coder Agent R2
          failure_lines = []
          in_failure = False
          for line in pytest_output.split("\n"):
              if line.startswith("FAILED") or "AssertionError" in line or "Error" in line:
                  in_failure = True
              if in_failure:
                  failure_lines.append(line)
              if len(failure_lines) > 150:
                  break
          failures_detail = "\n".join(failure_lines[:120])

          api_key = os.environ.get("ANTHROPIC_API_KEY", "")
          report = f"Tests passed: {tests_passed}, Coverage: {coverage_pct}%, Failed: {failed_count}"

          if api_key:
              prompt = f"""Tu es le Tester Agent du pipeline CI/CD AIB. Analyse ces résultats pytest.

PYTEST OUTPUT:
{pytest_output[-4000:]}

COVERAGE: {coverage_pct}%
TESTS PASSED: {tests_passed}
FAILED COUNT: {failed_count}

Génère un rapport markdown:
1. ✅/❌ Statut global
2. Stats: X passed, Y failed, Z% coverage
3. Si échecs: liste avec cause racine probable par test (1 ligne chacun)
4. Conclusion: PROCEED ou RETRY_WITH_CODER

Max 400 mots."""

              try:
                  payload = json.dumps({
                      "model": "claude-sonnet-4-20250514",
                      "max_tokens": 1000,
                      "messages": [{"role": "user", "content": prompt}]
                  }).encode()
                  req = urllib.request.Request(
                      "https://api.anthropic.com/v1/messages",
                      data=payload,
                      headers={"Content-Type": "application/json", "x-api-key": api_key, "anthropic-version": "2023-06-01"}
                  )
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      result = json.loads(resp.read())
                      report = result["content"][0]["text"]
              except Exception as e:
                  report = f"Claude unavailable: {e}\n{report}"

          gof = os.environ["GITHUB_OUTPUT"]
          with open(gof, "a") as f:
              f.write(f"tests_passed={'true' if tests_passed else 'false'}\n")
              f.write(f"coverage={coverage_pct}\n")
              f.write("test_report<<EOF\n" + report + "\nEOF\n")
              f.write("failures_detail<<EOF\n" + failures_detail[:2000] + "\nEOF\n")

          print("🧪 TESTER AGENT R1:", "✅ PASSED" if tests_passed else "❌ FAILED")
          print(report)
          PYTHON

      - name: Publish R1 summary
        if: always()
        run: |
          echo "## 🧪 Tester Agent — Round 1" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.evaluate.outputs.test_report }}" >> $GITHUB_STEP_SUMMARY
          echo "**Coverage:** ${{ steps.evaluate.outputs.coverage }}%" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  # 🔧 CODER AGENT (round 2) — Activé si tests R1 échouent
  # ─────────────────────────────────────────────────────────────
  coder-agent-r2:
    name: 🔧 Coder Agent (round 2 — retry)
    runs-on: ubuntu-latest
    needs: tester-agent-r1
    if: needs.tester-agent-r1.outputs.tests_passed == 'false'
    outputs:
      fixes_applied: ${{ steps.coder.outputs.fixes_applied }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]" || pip install -e .

      - name: Download test artifacts R1
        uses: actions/download-artifact@v4
        with:
          name: test-artifacts-r1
        continue-on-error: true

      - name: 🤖 Claude Coder Agent R2 — Correction ciblée sur les échecs
        id: coder
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FAILURES_DETAIL: ${{ needs.tester-agent-r1.outputs.failures_detail }}
          TEST_REPORT: ${{ needs.tester-agent-r1.outputs.test_report }}
        run: |
          python3 << 'PYTHON'
          import os, json, urllib.request, re, subprocess

          api_key = os.environ.get("ANTHROPIC_API_KEY", "")
          failures_detail = os.environ.get("FAILURES_DETAIL", "")
          test_report = os.environ.get("TEST_REPORT", "")

          if not api_key:
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("fixes_applied=false\n")
              exit(0)

          # Lire pytest output complet
          try:
              with open("pytest-output.txt") as f:
                  pytest_output = f.read()
          except:
              pytest_output = failures_detail

          # Identifier les fichiers de test en échec pour lire le source correspondant
          failed_files = set()
          for line in pytest_output.split("\n"):
              if line.startswith("FAILED"):
                  # ex: FAILED tests/test_core.py::TestPassport::test_create
                  parts = line.split("::")[0].replace("FAILED ", "").strip()
                  failed_files.add(parts)
                  # Trouver le module source correspondant
                  module = parts.replace("tests/test_", "aib/").replace(".py", ".py")
                  failed_files.add(module)

          # Lire les fichiers concernés
          source_context = {}
          for filepath in list(failed_files)[:6]:
              try:
                  with open(filepath) as f:
                      source_context[filepath] = f.read()[:3000]
              except:
                  pass

          source_summary = "\n\n".join([f"### {p}\n```python\n{c}\n```" for p, c in source_context.items()])

          prompt = f"""Tu es le Coder Agent du pipeline CI/CD AIB en mode RETRY.
Les tests ont échoué au round 1. Tu dois corriger le code source pour que les tests passent.

RAPPORT DU TESTER AGENT:
{test_report}

DÉTAIL DES ÉCHECS PYTEST:
{pytest_output[-4000:]}

CODE SOURCE DES FICHIERS CONCERNÉS:
{source_summary[:3000]}

Ta mission: propose des corrections précises et sûres pour corriger les tests en échec.

Réponds en JSON strict:
{{
  "root_cause": "Cause racine des échecs en 1 phrase",
  "fixes": [
    {{
      "file": "aib/xxx.py",
      "type": "bug",
      "description": "Ce qui est corrigé",
      "old_code": "code exact à remplacer (verbatim)",
      "new_code": "nouveau code"
    }}
  ],
  "confidence": "high|medium|low",
  "summary": "Résumé des corrections"
}}

IMPORTANT: old_code doit être du code verbatim existant dans le fichier — pas inventé."""

          try:
              payload = json.dumps({
                  "model": "claude-sonnet-4-20250514",
                  "max_tokens": 2000,
                  "messages": [{"role": "user", "content": prompt}]
              }).encode()
              req = urllib.request.Request(
                  "https://api.anthropic.com/v1/messages",
                  data=payload,
                  headers={"Content-Type": "application/json", "x-api-key": api_key, "anthropic-version": "2023-06-01"}
              )
              with urllib.request.urlopen(req, timeout=120) as resp:
                  result = json.loads(resp.read())
                  response_text = result["content"][0]["text"]

              json_match = re.search(r'\{.*\}', response_text, re.DOTALL)
              analysis = json.loads(json_match.group()) if json_match else {"fixes": [], "root_cause": "Unknown", "summary": "Could not parse", "confidence": "low"}

              print("🔧 CODER AGENT R2")
              print(f"Root cause: {analysis.get('root_cause', '')}")
              print(f"Confidence: {analysis.get('confidence', '')}")
              print(json.dumps(analysis, indent=2, ensure_ascii=False))

              # Appliquer les corrections automatiquement si confidence high/medium
              fixes_applied = 0
              if analysis.get("confidence") in ["high", "medium"]:
                  for fix in analysis.get("fixes", []):
                      filepath = fix.get("file", "")
                      old_code = fix.get("old_code", "")
                      new_code = fix.get("new_code", "")
                      if filepath and old_code and new_code:
                          try:
                              with open(filepath) as f:
                                  content = f.read()
                              if old_code in content:
                                  content = content.replace(old_code, new_code, 1)
                                  with open(filepath, "w") as f:
                                      f.write(content)
                                  print(f"✅ Applied fix to {filepath}")
                                  fixes_applied += 1
                              else:
                                  print(f"⚠️  old_code not found in {filepath} — skipping")
                          except Exception as e:
                              print(f"❌ Could not apply fix to {filepath}: {e}")

              with open("coder-r2-analysis.json", "w") as f:
                  json.dump({**analysis, "fixes_applied_count": fixes_applied}, f, ensure_ascii=False, indent=2)

              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"fixes_applied={'true' if fixes_applied > 0 else 'false'}\n")

          except Exception as e:
              print(f"Error: {e}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("fixes_applied=false\n")
          PYTHON

      - name: Commit fixes if applied
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "AIB Coder Agent"
          git config user.email "agent@aib-tech.fr"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix(agent-r2): auto-fix test failures detected by Tester Agent [skip ci]"
            git push origin main
            echo "✅ Fixes committed and pushed"
          fi

      - name: Publish R2 summary
        if: always()
        run: |
          echo "## 🔧 Coder Agent — Round 2 (retry)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coder-r2-analysis.json ]; then
            python3 -c "
          import json
          with open('coder-r2-analysis.json') as f: d = json.load(f)
          print(f'**Root cause:** {d.get(\"root_cause\", \"\")}')
          print(f'**Confidence:** {d.get(\"confidence\", \"\")}')
          print(f'**Fixes applied:** {d.get(\"fixes_applied_count\", 0)}')
          print()
          print(d.get('summary', ''))
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          fi

  # ─────────────────────────────────────────────────────────────
  # 🧪 TESTER AGENT (round 2) — Après correction du Coder R2
  # ─────────────────────────────────────────────────────────────
  tester-agent-r2:
    name: 🧪 Tester Agent (round 2 — after fix)
    runs-on: ubuntu-latest
    needs: coder-agent-r2
    outputs:
      tests_passed: ${{ steps.evaluate.outputs.tests_passed }}
      coverage: ${{ steps.evaluate.outputs.coverage }}
      test_report: ${{ steps.evaluate.outputs.test_report }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # Récupère le commit du Coder Agent R2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" || pip install -e .
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests (round 2)
        run: |
          python -m pytest tests/ -v --tb=short \
            -k "not integration" \
            --junitxml=test-results-r2.xml \
            --cov=aib --cov-report=json:coverage-r2.json \
            2>&1 | tee pytest-output-r2.txt
        continue-on-error: true

      - name: Upload artifacts R2
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-r2
          path: |
            test-results-r2.xml
            pytest-output-r2.txt
            coverage-r2.json

      - name: 🤖 Claude Tester Agent R2 — Évaluation finale
        id: evaluate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYTHON'
          import os, json, urllib.request

          try:
              with open("pytest-output-r2.txt") as f:
                  pytest_output = f.read()
          except:
              pytest_output = ""

          try:
              with open("coverage-r2.json") as f:
                  cov_data = json.load(f)
              coverage_pct = round(cov_data.get("totals", {}).get("percent_covered", 0), 1)
          except:
              coverage_pct = 0

          failed_count = 0
          for line in pytest_output.split("\n"):
              if " failed" in line and ("passed" in line or "error" in line):
                  try:
                      failed_count = int(line.strip().split(" failed")[0].split()[-1])
                  except:
                      pass
          tests_passed = failed_count == 0 and "passed" in pytest_output

          api_key = os.environ.get("ANTHROPIC_API_KEY", "")
          report = f"Round 2 — Tests passed: {tests_passed}, Coverage: {coverage_pct}%, Failed: {failed_count}"

          if api_key:
              prompt = f"""Tu es le Tester Agent du pipeline AIB — Round 2 (après correction automatique du Coder Agent).

PYTEST OUTPUT R2:
{pytest_output[-3000:]}

COVERAGE: {coverage_pct}%
TESTS PASSED: {tests_passed}

Génère un rapport markdown:
1. ✅/❌ Statut Round 2
2. Comparaison avec Round 1 si tu peux déduire
3. Si encore des échecs: lesquels persistent et pourquoi
4. Verdict final: PROCEED (publisher peut s'exécuter) ou MANUAL_REVIEW_REQUIRED

Max 300 mots."""

              try:
                  payload = json.dumps({
                      "model": "claude-sonnet-4-20250514",
                      "max_tokens": 800,
                      "messages": [{"role": "user", "content": prompt}]
                  }).encode()
                  req = urllib.request.Request(
                      "https://api.anthropic.com/v1/messages",
                      data=payload,
                      headers={"Content-Type": "application/json", "x-api-key": api_key, "anthropic-version": "2023-06-01"}
                  )
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      result = json.loads(resp.read())
                      report = result["content"][0]["text"]
              except Exception as e:
                  report = f"Claude unavailable: {e}\n{report}"

          gof = os.environ["GITHUB_OUTPUT"]
          with open(gof, "a") as f:
              f.write(f"tests_passed={'true' if tests_passed else 'false'}\n")
              f.write(f"coverage={coverage_pct}\n")
              f.write("test_report<<EOF\n" + report + "\nEOF\n")

          print("🧪 TESTER AGENT R2:", "✅ PASSED" if tests_passed else "❌ STILL FAILING")
          print(report)
          PYTHON

      - name: Publish R2 summary
        if: always()
        run: |
          echo "## 🧪 Tester Agent — Round 2" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.evaluate.outputs.test_report }}" >> $GITHUB_STEP_SUMMARY
          echo "**Coverage:** ${{ steps.evaluate.outputs.coverage }}%" >> $GITHUB_STEP_SUMMARY


  # ─────────────────────────────────────────────────────────────
  # 🔧 CODER AGENT (round 3) — Activé si tests R2 échouent
  # ─────────────────────────────────────────────────────────────
  coder-agent-r3:
    name: 🔧 Coder Agent (round 3 — final retry)
    runs-on: ubuntu-latest
    needs: tester-agent-r2
    if: needs.tester-agent-r2.outputs.tests_passed == 'false'
    outputs:
      fixes_applied: ${{ steps.coder.outputs.fixes_applied }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]" || pip install -e .

      - name: Download test artifacts R2
        uses: actions/download-artifact@v4
        with:
          name: test-artifacts-r2
        continue-on-error: true

      - name: 🤖 Claude Coder Agent R3 — Dernier recours
        id: coder
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_REPORT_R2: ${{ needs.tester-agent-r2.outputs.test_report }}
        run: |
          python3 << 'PYTHON'
          import os, json, urllib.request, re

          api_key = os.environ.get("ANTHROPIC_API_KEY", "")
          test_report_r2 = os.environ.get("TEST_REPORT_R2", "")

          if not api_key:
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("fixes_applied=false\n")
              exit(0)

          try:
              with open("pytest-output-r2.txt") as f:
                  pytest_output = f.read()
          except:
              pytest_output = test_report_r2

          # Identifier tous les fichiers en échec et lire leur code source complet
          failed_files = set()
          for line in pytest_output.split("\n"):
              if line.startswith("FAILED"):
                  parts = line.split("::")[0].replace("FAILED ", "").strip()
                  failed_files.add(parts)
                  module = parts.replace("tests/test_", "aib/").replace(".py", ".py")
                  failed_files.add(module)

          source_context = {}
          for filepath in list(failed_files)[:8]:
              try:
                  with open(filepath) as f:
                      source_context[filepath] = f.read()[:4000]
              except:
                  pass

          source_summary = "\n\n".join([f"### {p}\n```python\n{c}\n```" for p, c in source_context.items()])

          prompt = f"""Tu es le Coder Agent du pipeline CI/CD AIB — ROUND 3 (dernier recours).
Les rounds 1 et 2 n'ont pas suffi à corriger tous les tests. Analyse approfondie requise.

RAPPORT TESTER R2:
{test_report_r2}

PYTEST OUTPUT R2 (complet):
{pytest_output[-5000:]}

CODE SOURCE COMPLET DES FICHIERS CONCERNÉS:
{source_summary[:4000]}

C'est le dernier round automatique. Sois exhaustif et précis.
Si tu ne peux pas corriger avec certitude, indique confidence=low et n'applique rien.

Réponds en JSON strict:
{{
  "root_cause": "Analyse approfondie de la cause racine",
  "fixes": [
    {{
      "file": "aib/xxx.py",
      "type": "bug",
      "description": "Ce qui est corrigé",
      "old_code": "code verbatim existant",
      "new_code": "nouveau code"
    }}
  ],
  "confidence": "high|medium|low",
  "summary": "Résumé des corrections R3",
  "manual_review_hint": "Si confidence=low, indique ici ce qu'un humain devrait vérifier"
}}"""

          try:
              payload = json.dumps({
                  "model": "claude-sonnet-4-20250514",
                  "max_tokens": 2000,
                  "messages": [{"role": "user", "content": prompt}]
              }).encode()
              req = urllib.request.Request(
                  "https://api.anthropic.com/v1/messages",
                  data=payload,
                  headers={"Content-Type": "application/json", "x-api-key": api_key, "anthropic-version": "2023-06-01"}
              )
              with urllib.request.urlopen(req, timeout=120) as resp:
                  result = json.loads(resp.read())
                  response_text = result["content"][0]["text"]

              json_match = re.search(r'\{.*\}', response_text, re.DOTALL)
              analysis = json.loads(json_match.group()) if json_match else {"fixes": [], "root_cause": "Parse error", "confidence": "low", "summary": "Could not parse", "manual_review_hint": response_text[:300]}

              print("🔧 CODER AGENT R3")
              print(f"Root cause: {analysis.get('root_cause', '')}")
              print(f"Confidence: {analysis.get('confidence', '')}")

              fixes_applied = 0
              if analysis.get("confidence") in ["high", "medium"]:
                  for fix in analysis.get("fixes", []):
                      filepath = fix.get("file", "")
                      old_code = fix.get("old_code", "")
                      new_code = fix.get("new_code", "")
                      if filepath and old_code and new_code:
                          try:
                              with open(filepath) as f:
                                  content = f.read()
                              if old_code in content:
                                  content = content.replace(old_code, new_code, 1)
                                  with open(filepath, "w") as f:
                                      f.write(content)
                                  print(f"✅ Applied fix to {filepath}")
                                  fixes_applied += 1
                              else:
                                  print(f"⚠️  old_code not found in {filepath} — skipping")
                          except Exception as e:
                              print(f"❌ Error: {e}")
              else:
                  hint = analysis.get("manual_review_hint", "")
                  print(f"⚠️  Confidence low — no auto-fix applied")
                  print(f"Manual review hint: {hint}")

              with open("coder-r3-analysis.json", "w") as f:
                  json.dump({**analysis, "fixes_applied_count": fixes_applied}, f, ensure_ascii=False, indent=2)

              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"fixes_applied={'true' if fixes_applied > 0 else 'false'}\n")

          except Exception as e:
              print(f"Error: {e}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("fixes_applied=false\n")
          PYTHON

      - name: Commit R3 fixes if applied
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "AIB Coder Agent"
          git config user.email "agent@aib-tech.fr"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix(agent-r3): final auto-fix attempt after R2 failure [skip ci]"
            git push origin main
            echo "✅ R3 fixes committed"
          fi

      - name: Publish R3 summary
        if: always()
        run: |
          echo "## 🔧 Coder Agent — Round 3 (final retry)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coder-r3-analysis.json ]; then
            python3 -c "
          import json
          with open('coder-r3-analysis.json') as f: d = json.load(f)
          print(f'**Root cause:** {d.get(\"root_cause\", \"\")}')
          print(f'**Confidence:** {d.get(\"confidence\", \"\")}')
          print(f'**Fixes applied:** {d.get(\"fixes_applied_count\", 0)}')
          if d.get(\"manual_review_hint\"):
              print(f'\\n> ⚠️ Manual review hint: {d[\"manual_review_hint\"]}')
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          fi

  # ─────────────────────────────────────────────────────────────
  # 🧪 TESTER AGENT (round 3) — Après correction Coder R3
  # ─────────────────────────────────────────────────────────────
  tester-agent-r3:
    name: 🧪 Tester Agent (round 3 — final)
    runs-on: ubuntu-latest
    needs: coder-agent-r3
    outputs:
      tests_passed: ${{ steps.evaluate.outputs.tests_passed }}
      coverage: ${{ steps.evaluate.outputs.coverage }}
      test_report: ${{ steps.evaluate.outputs.test_report }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" || pip install -e .
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests (round 3)
        run: |
          python -m pytest tests/ -v --tb=short \
            -k "not integration" \
            --junitxml=test-results-r3.xml \
            --cov=aib --cov-report=json:coverage-r3.json \
            2>&1 | tee pytest-output-r3.txt
        continue-on-error: true

      - name: Upload artifacts R3
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-r3
          path: |
            test-results-r3.xml
            pytest-output-r3.txt
            coverage-r3.json

      - name: 🤖 Claude Tester Agent R3 — Verdict final
        id: evaluate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYTHON'
          import os, json, urllib.request

          try:
              with open("pytest-output-r3.txt") as f:
                  pytest_output = f.read()
          except:
              pytest_output = ""

          try:
              with open("coverage-r3.json") as f:
                  cov_data = json.load(f)
              coverage_pct = round(cov_data.get("totals", {}).get("percent_covered", 0), 1)
          except:
              coverage_pct = 0

          failed_count = 0
          for line in pytest_output.split("\n"):
              if " failed" in line and ("passed" in line or "error" in line):
                  try:
                      failed_count = int(line.strip().split(" failed")[0].split()[-1])
                  except:
                      pass
          tests_passed = failed_count == 0 and "passed" in pytest_output

          api_key = os.environ.get("ANTHROPIC_API_KEY", "")
          report = f"Round 3 FINAL — Tests passed: {tests_passed}, Coverage: {coverage_pct}%, Failed: {failed_count}"

          if api_key:
              prompt = f"""Tu es le Tester Agent — Round 3 FINAL (dernier round automatique possible).

PYTEST OUTPUT R3:
{pytest_output[-3000:]}

COVERAGE: {coverage_pct}%
TESTS PASSED: {tests_passed}

Génère un rapport markdown:
1. ✅/❌ Statut Round 3 FINAL
2. Si encore des échecs: liste précise des tests qui persistent avec cause probable
3. Verdict: PROCEED ou MANUAL_REVIEW_REQUIRED (plus de retry automatique possible)
4. Si MANUAL_REVIEW_REQUIRED: donne 2-3 pistes concrètes pour le développeur

Max 350 mots."""

              try:
                  payload = json.dumps({
                      "model": "claude-sonnet-4-20250514",
                      "max_tokens": 800,
                      "messages": [{"role": "user", "content": prompt}]
                  }).encode()
                  req = urllib.request.Request(
                      "https://api.anthropic.com/v1/messages",
                      data=payload,
                      headers={"Content-Type": "application/json", "x-api-key": api_key, "anthropic-version": "2023-06-01"}
                  )
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      result = json.loads(resp.read())
                      report = result["content"][0]["text"]
              except Exception as e:
                  report = f"Claude unavailable: {e}\n{report}"

          gof = os.environ["GITHUB_OUTPUT"]
          with open(gof, "a") as f:
              f.write(f"tests_passed={'true' if tests_passed else 'false'}\n")
              f.write(f"coverage={coverage_pct}\n")
              f.write("test_report<<EOF\n" + report + "\nEOF\n")

          print("🧪 TESTER AGENT R3 FINAL:", "✅ PASSED" if tests_passed else "❌ MANUAL REVIEW REQUIRED")
          print(report)
          PYTHON

      - name: Publish R3 summary
        if: always()
        run: |
          echo "## 🧪 Tester Agent — Round 3 (FINAL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.evaluate.outputs.test_report }}" >> $GITHUB_STEP_SUMMARY
          echo "**Coverage:** ${{ steps.evaluate.outputs.coverage }}%" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  # 🚀 PUBLISHER AGENT — Bump + build + PyPI
  # Activé si R1 OK OU si R2 OK (après retry)
  # ─────────────────────────────────────────────────────────────
  publisher-agent:
    name: 🚀 Publisher Agent
    runs-on: ubuntu-latest
    needs: [tester-agent-r1, tester-agent-r2, coder-agent-r2, tester-agent-r3, coder-agent-r3]
    if: |
      always() &&
      github.event.inputs.publish == 'true' &&
      (
        needs.tester-agent-r1.outputs.tests_passed == 'true' ||
        (needs.tester-agent-r2.result == 'success' && needs.tester-agent-r2.outputs.tests_passed == 'true') ||
        (needs.tester-agent-r3.result == 'success' && needs.tester-agent-r3.outputs.tests_passed == 'true')
      )

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main   # Toujours la dernière version (avec fixes éventuels)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: pip install build twine

      - name: 🤖 Claude Publisher Agent — Bump version + release notes
        id: bump
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUMP_TYPE: ${{ github.event.inputs.bump }}
        run: |
          python3 << 'PYTHON'
          import os, re, json, urllib.request

          bump_type = os.environ.get("BUMP_TYPE", "patch")

          with open("pyproject.toml") as f:
              content = f.read()
          match = re.search(r'version = "(\d+)\.(\d+)\.(\d+)"', content)
          major, minor, patch = int(match.group(1)), int(match.group(2)), int(match.group(3))
          old_version = f"{major}.{minor}.{patch}"

          if bump_type == "major":
              major += 1; minor = 0; patch = 0
          elif bump_type == "minor":
              minor += 1; patch = 0
          else:
              patch += 1
          new_version = f"{major}.{minor}.{patch}"

          new_content = content.replace(f'version = "{old_version}"', f'version = "{new_version}"')
          with open("pyproject.toml", "w") as f:
              f.write(new_content)

          with open("aib/__init__.py") as f:
              init_content = f.read()
          init_content = init_content.replace(f'__version__ = "{old_version}"', f'__version__ = "{new_version}"')
          with open("aib/__init__.py", "w") as f:
              f.write(init_content)

          api_key = os.environ.get("ANTHROPIC_API_KEY", "")
          release_notes = f"## [{new_version}]\n\n- Automated release by Publisher Agent\n- Bump type: {bump_type}"

          if api_key:
              try:
                  with open("CHANGELOG.md") as f:
                      changelog = f.read()[:1500]
                  from datetime import date
                  today = date.today().isoformat()
                  prompt = f"""Génère des release notes concises pour agent-identity-bridge {new_version} (bump {bump_type} depuis {old_version}).

CHANGELOG récent:
{changelog}

Format:
## [{new_version}] - {today}
### Changed/Fixed/Added
- ...

Max 120 mots."""
                  payload = json.dumps({
                      "model": "claude-haiku-4-5-20251001",
                      "max_tokens": 400,
                      "messages": [{"role": "user", "content": prompt}]
                  }).encode()
                  req = urllib.request.Request(
                      "https://api.anthropic.com/v1/messages",
                      data=payload,
                      headers={"Content-Type": "application/json", "x-api-key": api_key, "anthropic-version": "2023-06-01"}
                  )
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      result = json.loads(resp.read())
                      release_notes = result["content"][0]["text"]
              except Exception as e:
                  print(f"Claude unavailable: {e}")

          with open("release-notes.md", "w") as f:
              f.write(release_notes)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"old_version={old_version}\n")
              f.write(f"new_version={new_version}\n")

          print(f"✅ Version: {old_version} → {new_version}")
          print(release_notes)
          PYTHON

      - name: Commit version bump
        run: |
          git config user.name "AIB Publisher Agent"
          git config user.email "agent@aib-tech.fr"
          git add pyproject.toml aib/__init__.py
          git commit -m "chore(release): bump to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin main --tags

      - name: Build
        run: |
          rm -rf dist/ build/ *.egg-info
          python -m build
          ls -lh dist/

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: python -m twine upload dist/* --non-interactive

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.new_version }}" \
            --title "v${{ steps.bump.outputs.new_version }}" \
            --notes-file release-notes.md \
            dist/*.whl dist/*.tar.gz

      - name: Publisher summary
        run: |
          echo "## 🚀 Publisher Agent" >> $GITHUB_STEP_SUMMARY
          echo "**${{ steps.bump.outputs.old_version }} → ${{ steps.bump.outputs.new_version }}** (${BUMP_TYPE})" >> $GITHUB_STEP_SUMMARY
          cat release-notes.md >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  # 📊 PIPELINE SUMMARY
  # ─────────────────────────────────────────────────────────────
  pipeline-summary:
    name: 📊 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [tester-agent-r1, coder-agent-r2, tester-agent-r2, coder-agent-r3, tester-agent-r3, publisher-agent]
    if: always()
    steps:
      - name: Final summary
        run: |
          echo "# 🤖 AI Agent Pipeline — Final Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Agent | Round | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 Coder Agent | R1 | ${{ needs.coder-agent-r1.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tester Agent | R1 | ${{ needs.tester-agent-r1.result }} (passed: ${{ needs.tester-agent-r1.outputs.tests_passed }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 Coder Agent | R2 (retry) | ${{ needs.coder-agent-r2.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tester Agent | R2 | ${{ needs.tester-agent-r2.result }} (passed: ${{ needs.tester-agent-r2.outputs.tests_passed }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 Coder Agent | R3 (final retry) | ${{ needs.coder-agent-r3.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tester Agent | R3 (final) | ${{ needs.tester-agent-r3.result }} (passed: ${{ needs.tester-agent-r3.outputs.tests_passed }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Publisher | — | ${{ needs.publisher-agent.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Verdict final
          if [ "${{ needs.publisher-agent.result }}" = "success" ]; then
            echo "### ✅ Pipeline complet — Publié sur PyPI" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.tester-agent-r3.outputs.tests_passed }}" = "false" ]; then
            echo "### ❌ Tests encore en échec après 3 rounds — Review manuelle requise" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.tester-agent-r1.outputs.tests_passed }}" = "true" ]; then
            echo "### ✅ Tests OK — Publisher non déclenché (publish=false)" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Pipeline terminé — voir les rapports ci-dessus" >> $GITHUB_STEP_SUMMARY
          fi

