name: AIB CI/CD

on:
  push:
    branches: [main, develop, deploy-prod]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ─── Unit Tests ─────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install pytest pytest-asyncio

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short -k "not integration" --junitxml=test-results.xml

      - name: Test summary
        if: always()
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          python -m pytest tests/ -q -k "not integration" 2>&1 | tail -3 >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml


  # ─── CLI Node.js Tests ─────────────────────────────
  test-cli:
    name: CLI Tests (Node.js)
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CLI dependencies
        working-directory: cli
        run: npm install

      - name: Run CLI audit tests (42 tests)
        working-directory: cli
        run: node tests/audit.mjs

      - name: CLI test summary
        if: always()
        run: |
          echo "### CLI Tests (@aib-protocol/cli)" >> $GITHUB_STEP_SUMMARY
          if [ $? -eq 0 ]; then
            echo "✅ 42/42 tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ CLI tests failed — see logs" >> $GITHUB_STEP_SUMMARY
          fi

  # ─── Integration Tests ──────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test, test-cli]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" || pip install -e .
          pip install pytest

      - name: Run integration tests
        env:
          AIB_TEST_API_KEY: ${{ secrets.AIB_TEST_API_KEY }}
          AIB_BASE_URL: ${{ secrets.SUPABASE_URL }}/functions/v1
        run: |
          if [ -z "$AIB_TEST_API_KEY" ]; then
            echo "⚠️ AIB_TEST_API_KEY not set — skipping integration tests"
            echo "Add it in Settings → Secrets → Actions"
            exit 0
          fi
          python -m pytest tests/test_integration.py -v --tb=short

  # ─── Deploy to DEV (aib-dev.netlify.app) ─────────
  deploy-dev:
    name: Deploy DEV
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy files
        run: |
          cd cloud/landing
          echo "Using netlify.toml from repo:"
          cat netlify.toml
          echo ""
          echo "Files ready for deploy:"
          ls -la *.html *.toml 2>/dev/null | head -15

      - name: Deploy to DEV (aib-dev.netlify.app)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_DEV_SITE_ID }}
        if: env.NETLIFY_AUTH_TOKEN != ''
        run: |
          cd cloud/landing
          zip -r /tmp/deploy.zip . -x "*.git*"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @/tmp/deploy.zip \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/deploys")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            DEPLOY_URL=$(echo "$BODY" | python3 -c "import json,sys; print(json.load(sys.stdin).get('ssl_url',''))" 2>/dev/null)
            echo "✅ DEV deployed: $DEPLOY_URL"
            echo "👉 Review at https://aib-dev.netlify.app then promote to prod"
          else
            echo "❌ Deploy failed (HTTP $HTTP_CODE)"
            echo "$BODY" | head -5
            exit 1
          fi

  # ─── Deploy to PROD (aib-tech.fr) ──────────────
  # This job only runs on the 'deploy-prod' branch or when manually triggered
  deploy-prod:
    name: Deploy PROD
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/deploy-prod'
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy files
        run: |
          cd cloud/landing
          echo "Using netlify.toml from repo (with DID:web redirects):"
          head -5 netlify.toml

      - name: Deploy to PROD (aib-tech.fr)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PROD_SITE_ID }}
        if: env.NETLIFY_AUTH_TOKEN != ''
        run: |
          cd cloud/landing
          zip -r /tmp/deploy.zip . -x "*.git*"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @/tmp/deploy.zip \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/deploys")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            DEPLOY_URL=$(echo "$BODY" | python3 -c "import json,sys; print(json.load(sys.stdin).get('ssl_url',''))" 2>/dev/null)
            echo "✅ PROD deployed: $DEPLOY_URL"
          else
            echo "❌ Deploy failed (HTTP $HTTP_CODE)"
            echo "$BODY" | head -5
            exit 1
          fi

  # ─── Security Audit ────────────────────────────────
  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for exposed secrets
        run: |
          echo "🔍 Scanning for exposed secrets..."
          FOUND=0

          # Check for Netlify PAT tokens (real ones are 40+ chars)
          MATCHES=$(grep -rn "nfp_[A-Za-z0-9]\{20,\}" --include="*.py" --include="*.ts" --include="*.js" --include="*.html" . 2>/dev/null | grep -v "node_modules\|\.git" || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ Netlify tokens found:"
            echo "$MATCHES"
            FOUND=1
          fi

          # Check for Supabase service_role keys (JWT format)
          MATCHES=$(grep -rn "service_role.*eyJ" --include="*.py" --include="*.ts" --include="*.js" --include="*.html" . 2>/dev/null | grep -v "node_modules\|\.git\|Deno\.env" || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ Service role keys found:"
            echo "$MATCHES"
            FOUND=1
          fi

          # Check for GitHub tokens
          MATCHES=$(grep -rn "ghp_[A-Za-z0-9]\{20,\}" --include="*.py" --include="*.ts" --include="*.js" --include="*.html" --include="*.md" . 2>/dev/null | grep -v "node_modules\|\.git" || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ GitHub tokens found:"
            echo "$MATCHES"
            FOUND=1
          fi

          if [ $FOUND -eq 0 ]; then
            echo "✅ No secrets found in source code"
          else
            exit 1
          fi

      - name: Check for large files
        run: |
          LARGE=$(find . -type f -size +1M -not -path './.git/*' -not -path './node_modules/*' 2>/dev/null)
          if [ -n "$LARGE" ]; then
            echo "⚠️ Large files found:"
            echo "$LARGE"
          else
            echo "✅ No large files"
          fi
