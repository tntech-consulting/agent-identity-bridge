name: AIB CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12'
  SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
  NETLIFY_PROTOCOL_SITE_ID: ${{ secrets.NETLIFY_PROTOCOL_SITE_ID }}
  NETLIFY_SAAS_SITE_ID: ${{ secrets.NETLIFY_SAAS_SITE_ID }}

jobs:
  # ─── Unit Tests ─────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest pytest-asyncio

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # ─── Integration Tests ──────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e .

      - name: Run integration tests
        env:
          AIB_TEST_API_KEY: ${{ secrets.AIB_TEST_API_KEY }}
          AIB_BASE_URL: ${{ secrets.SUPABASE_URL }}/functions/v1
        run: |
          python -m pytest tests/test_integration.py -v --tb=short

  # ─── Deploy Edge Functions ──────────────────────────
  deploy-edge:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://supabase.com/install.sh | sh

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Edge Functions are deployed via Supabase MCP during development."
          echo "Production deployments are tracked in CHANGELOG.md."
          echo "Current Edge Function versions:"
          supabase functions list --project-ref $SUPABASE_PROJECT_ID 2>/dev/null || echo "CLI deploy skipped (manual via MCP)"

  # ─── Deploy Netlify Sites ──────────────────────────
  deploy-netlify:
    name: Deploy Netlify
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy protocol site (aib-tech.fr)
        if: env.NETLIFY_PROTOCOL_SITE_ID != ''
        run: |
          npm install -g netlify-cli
          cd cloud/landing
          echo '[[headers]]
            for = "/*"
            [headers.values]
              Content-Type = "text/html; charset=UTF-8"' > netlify.toml
          netlify deploy --prod --dir=. --site=$NETLIFY_PROTOCOL_SITE_ID --auth=$NETLIFY_AUTH_TOKEN

      - name: Deploy SaaS site (aib-cloud.netlify.app)
        if: env.NETLIFY_SAAS_SITE_ID != ''
        run: |
          cd cloud/landing
          netlify deploy --prod --dir=. --site=$NETLIFY_SAAS_SITE_ID --auth=$NETLIFY_AUTH_TOKEN

  # ─── Security Audit ────────────────────────────────
  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          echo "Scanning for exposed secrets..."
          # Check for common secret patterns
          if grep -rn "sk_live_\|service_role\|supabase_key\|nfp_" --include="*.py" --include="*.ts" --include="*.js" --include="*.html" . 2>/dev/null | grep -v "test\|mock\|example\|SKILL\|\.env" | head -5; then
            echo "WARNING: Potential secrets found in source code"
            exit 1
          fi
          echo "No secrets found in source code."

      - name: Check for large files
        run: |
          find . -type f -size +1M -not -path './.git/*' | head -5
          echo "Large file check complete."
