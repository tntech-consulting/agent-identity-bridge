name: AIB CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ─── Unit Tests ─────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || echo "Install from source"
          pip install pytest pytest-asyncio

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short -k "not integration" --junitxml=test-results.xml

      - name: Test summary
        if: always()
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          python -m pytest tests/ -q -k "not integration" 2>&1 | tail -3 >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # ─── Integration Tests ──────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || echo "Install from source"
          pip install pytest

      - name: Run integration tests
        env:
          AIB_TEST_API_KEY: ${{ secrets.AIB_TEST_API_KEY }}
          AIB_BASE_URL: ${{ secrets.SUPABASE_URL }}/functions/v1
        run: |
          if [ -z "$AIB_TEST_API_KEY" ]; then
            echo "⚠️ AIB_TEST_API_KEY not set — skipping integration tests"
            echo "Add it in Settings → Secrets → Actions"
            exit 0
          fi
          python -m pytest tests/test_integration.py -v --tb=short

  # ─── Deploy Netlify Sites ──────────────────────────
  deploy-netlify:
    name: Deploy Netlify
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy protocol site (aib-tech.fr)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PROTOCOL_SITE_ID }}
        if: env.NETLIFY_AUTH_TOKEN != ''
        run: |
          npm install -g netlify-cli
          cd cloud/landing
          cat > netlify.toml << 'EOF'
          [[headers]]
            for = "/*"
            [headers.values]
              Content-Type = "text/html; charset=UTF-8"
          EOF
          netlify deploy --prod --dir=. --site=$NETLIFY_SITE_ID --auth=$NETLIFY_AUTH_TOKEN

      - name: Deploy SaaS site (aib-cloud.netlify.app)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SAAS_SITE_ID }}
        if: env.NETLIFY_AUTH_TOKEN != ''
        run: |
          cd cloud/landing
          netlify deploy --prod --dir=. --site=$NETLIFY_SITE_ID --auth=$NETLIFY_AUTH_TOKEN

  # ─── Security Audit ────────────────────────────────
  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for exposed secrets
        run: |
          echo "🔍 Scanning for exposed secrets..."
          FOUND=0

          # Check for real API keys (not test fixtures)
          if grep -rn "nfp_\|service_role_key\s*=" --include="*.py" --include="*.ts" --include="*.js" --include="*.html" . 2>/dev/null \
            | grep -v "node_modules\|\.git\|test_\|mock\|example\|SKILL\|\.env\|secrets\." | head -5; then
            echo "❌ Potential secrets found"
            FOUND=1
          fi

          # Check for hardcoded Supabase URLs with keys
          if grep -rn "eyJ.*supabase" --include="*.py" --include="*.ts" --include="*.js" . 2>/dev/null \
            | grep -v "test_\|mock\|example" | head -3; then
            echo "❌ Hardcoded Supabase tokens found"
            FOUND=1
          fi

          if [ $FOUND -eq 0 ]; then
            echo "✅ No secrets found in source code"
          else
            exit 1
          fi

      - name: Check for large files
        run: |
          LARGE=$(find . -type f -size +1M -not -path './.git/*' -not -path './node_modules/*' 2>/dev/null)
          if [ -n "$LARGE" ]; then
            echo "⚠️ Large files found:"
            echo "$LARGE"
          else
            echo "✅ No large files"
          fi
